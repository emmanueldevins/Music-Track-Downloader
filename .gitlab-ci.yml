# GitLab CI — builds Music Track Downloader for Windows (64-bit).
# Prefer GitHub Actions for Mac+Windows auto-release.

stages:
  - build

build-windows:
  stage: build
  tags:
    - saas-windows-medium-amd64
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File .\build_windows.ps1
  artifacts:
    name: MusicTrackDownloader-win64
    paths:
      - dist/MusicTrackDownloader-win64.zip
      - dist/MusicTrackDownloader/
    expire_in: 30 days
