name: Build Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to upload Windows zip to (e.g. v1.0.0). Leave empty to only keep the workflow artifact."
        required: false
        default: "v1.0.0"
      publish_release:
        description: "Attach zip to GitHub Release (true/false)"
        required: false
        default: "true"
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build CHARLIEDL
        shell: pwsh
        run: ./build_windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: CHARLIEDL-win64
          path: dist/CHARLIEDL-win64.zip

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then TAG="v1.0.0"; fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Windows zip to GitHub Release
        if: ${{ github.event_name == 'push' || inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Music Track Downloader ${{ steps.tag.outputs.tag }}
          body: |
            Personal / educational use only — **no commercial use**. See LICENSE and README.

            ### Downloads
            - **Windows:** `CHARLIEDL-win64.zip` (this build)
            - **macOS:** upload `CHARLIEDL-mac-arm64.zip` from a Mac (`./build_app.sh`) to this same release

            ### Install
            - Windows: unzip → `CHARLIEDL.exe` (SmartScreen → More info → Run anyway)
            - macOS: unzip → right-click `CHARLIEDL.app` → Open
          files: dist/CHARLIEDL-win64.zip
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
