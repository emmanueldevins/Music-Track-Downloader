name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "app_gui.py"
      - "download_playlist.py"
      - "CHARLIEDL-win.spec"
      - "build_windows.ps1"
      - "requirements.txt"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build CHARLIEDL
        shell: pwsh
        run: ./build_windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: CHARLIEDL-win64
          path: |
            dist/CHARLIEDL-win64.zip
            dist/CHARLIEDL/
