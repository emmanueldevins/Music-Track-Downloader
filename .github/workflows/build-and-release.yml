name: Build & Release

# On every push to main:
# 1) bump patch version (1.1.0 → 1.1.1) and commit with [skip ci]
# 2) build Mac + Windows with that version
# 3) publish both zips to the "latest" GitHub Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    # Avoid re-entry when the bump commit itself is pushed ([skip ci] also helps).
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump patch version
        id: bump
        run: |
          NEW="$(python bump_version.py)"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Bumped to v${NEW}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION version.py
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main

  build-macos:
    name: macOS (Apple Silicon)
    needs: bump-version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure version files match bump
        run: |
          echo "${{ needs.bump-version.outputs.version }}" > VERSION
          python3 - <<'PY'
          import pathlib, re, os
          v = os.environ["VER"]
          path = pathlib.Path("version.py")
          text = path.read_text()
          text = re.sub(
              r'^APP_VERSION\s*=\s*["\'][^"\']*["\']',
              f'APP_VERSION = "{v}"',
              text,
              count=1,
              flags=re.M,
          )
          path.write_text(text)
          PY
        env:
          VER: ${{ needs.bump-version.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Mac app
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - uses: actions/upload-artifact@v4
        with:
          name: MusicTrackDownloader-mac-arm64
          path: dist/MusicTrackDownloader-mac-arm64.zip

  build-windows:
    name: Windows (x64)
    needs: bump-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure version files match bump
        shell: bash
        run: |
          echo "${{ needs.bump-version.outputs.version }}" > VERSION
          python - <<'PY'
          import pathlib, re, os
          v = os.environ["VER"]
          path = pathlib.Path("version.py")
          text = path.read_text(encoding="utf-8")
          text = re.sub(
              r'^APP_VERSION\s*=\s*["\'][^"\']*["\']',
              f'APP_VERSION = "{v}"',
              text,
              count=1,
              flags=re.M,
          )
          path.write_text(text, encoding="utf-8")
          PY
        env:
          VER: ${{ needs.bump-version.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows app
        shell: pwsh
        run: ./build_windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: MusicTrackDownloader-win64
          path: dist/MusicTrackDownloader-win64.zip

  publish:
    name: Publish GitHub Release
    needs: [bump-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac zip
        uses: actions/download-artifact@v4
        with:
          name: MusicTrackDownloader-mac-arm64
          path: release-assets

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: MusicTrackDownloader-win64
          path: release-assets

      - name: Publish / update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Music Track Downloader v${{ needs.bump-version.outputs.version }}
          body: |
            **Personal / educational use only — no commercial use.** See [LICENSE](../blob/main/LICENSE) and [README](../blob/main/README.md).

            **Version:** `${{ needs.bump-version.outputs.version }}`  
            Auto-bumped and built on push to `main`.

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon | `MusicTrackDownloader-mac-arm64.zip` |
            | Windows 64-bit | `MusicTrackDownloader-win64.zip` |

            ### Install
            - **Mac:** unzip → if macOS says « endommagé », run:
              `xattr -cr ~/Downloads/MusicTrackDownloader.app`
              then open the app (or right-click → Open)
            - **Windows:** unzip → `MusicTrackDownloader.exe` (SmartScreen → More info → Run anyway)
          files: |
            release-assets/MusicTrackDownloader-mac-arm64.zip
            release-assets/MusicTrackDownloader-win64.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
